name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://api.drafif.cloud

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: read

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            # Login to ghcr.io and pull the latest image
            echo "${{ github.token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository }}:latest

            # Remove any stale frontend container still registered for drafif.cloud.
            # nginx-proxy can keep routing to old containers if they share VIRTUAL_HOST.
            for container_id in $(docker ps -aq); do
              if docker inspect "$container_id" --format '{{range .Config.Env}}{{println .}}{{end}}' | grep -qx 'VIRTUAL_HOST=drafif.cloud'; then
                container_name=$(docker inspect "$container_id" --format '{{.Name}}' | sed 's#^/##')
                if [ "$container_name" != "cashflow-frontend" ]; then
                  echo "Removing stale drafif.cloud frontend container: $container_name"
                  docker rm -f "$container_id" || true
                fi
              fi
            done

            # Create project directory if it doesn't exist
            mkdir -p /opt/brightfrontnew

            # Navigate to project directory
            cd /opt/brightfrontnew

            # Force stop and remove existing container
            docker stop cashflow-frontend || true
            docker rm cashflow-frontend || true
            docker compose down || true

            # Start the new container directly to avoid stale compose files
            docker network inspect nginx-proxy_proxy >/dev/null
            docker run -d \
              --name cashflow-frontend \
              --restart unless-stopped \
              --network nginx-proxy_proxy \
              -p 3001:3001 \
              -e NODE_ENV=production \
              -e NEXT_PUBLIC_API_BASE_URL=https://api.drafif.cloud \
              -e VIRTUAL_HOST=drafif.cloud \
              -e LETSENCRYPT_HOST=drafif.cloud \
              ghcr.io/${{ github.repository }}:latest

            # Clean up old images
            docker image prune -f

            echo "Deployment completed successfully!"
